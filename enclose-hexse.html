}

const handlePointerMove = e => {

      if (lenSq(sub(ptr,dragState.current.init))>5){

const handleWheel = e => {
  if (!e.shiftKey &&!e.ctrlKey&&!e.altKey&&!e.metaKey){
    const ptr=v(e.clientX,e.clientY)
    // let's think about it in 2d

    // idk
    // oh nvm we have s'
    // tx' = tx + px * (s - s')

    const newscale = viewRef.current.scale * Math.exp(Math.min(Math.max(-2, -e.deltaY / 600), 2))
    const newView = {

      translate: add(viewRef.current.translate, scale(sub(viewRef.current.translate,ptr,), (newscale-viewRef.current.scale)/viewRef.current.scale))
    }
    setView(viewRef.current=newView)
  }
